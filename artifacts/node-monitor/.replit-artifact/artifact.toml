kind = "web"
previewPath = "/"
title = "Node Monitor"
version = "1.0.0"
id = "artifacts/node-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21962

[services.development]
run = "pnpm --filter @workspace/node-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/node-monitor", "run", "build" ]
publicDir = "artifacts/node-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21962"
BASE_PATH = "/"
